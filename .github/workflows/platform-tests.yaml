name: Platform tests

on:
    workflow_call:
        inputs:
            subtest:
                type: string
                default: ""
                required: false
            working-directory:
                type: string
                default: .
                required: false
            additional-working-directory:
                type: string
                required: false

jobs:
    scheduledPlatformTests:
        name: Scheduled Platform tests
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ${{ inputs.working-directory }}
        steps:
            # A simple node script that converts secrets to env vars
            # Use specific commit SHA to protect from someone stealing that repo
            - uses: oNaiPs/secrets-to-env-action@b64e0192bc4bd2ec0682dee8696470d4866577fa
              with:
                secrets: ${{ toJSON(secrets) }}

            - name: Setup repository and dependencies
              uses: apify-store/github-actions-source/.github/actions/checkout-restore-dependencies@master
              with:
                  working-directory: ${{ inputs.working-directory }}
                  additional-working-directory: ${{ inputs.additional-working-directory }}

            - name: Test
              run: |
                  set +e
                  export RUN_ALL_PLATFORM_TESTS=1
                  npx vitest ./test/platform/${{ inputs.subtest }} \
                    --run \
                    --reporter=default \
                    --reporter=json \
                    --outputFile=./test-output.json \
                    --maxConcurrency 20 \
                    --fileParallelism=true \
                    --maxWorkers 100
                  return_code=$?
                  npx apify-test-tools report-tests \
                    --report-file ./test-output.json \
                    --workspace . \
                    --workflow-name "${{ github.workflow }}" \
                    --job-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
                    --report-slack-channel "#notif-${{ github.event.repository.name }}"
                  exit $return_code

            - name: Upload Vitest JSON artifact
              uses: actions/upload-artifact@v6
              if: always()
              with:
                  name: vitest-results
                  path: ./test-output.json