name: Build latest and report to slack

on:
    workflow_call:
        # This doesn't do anything, we just have to keep it for backward compatibility
        # as passing invalid input crashes the workflow
        inputs:
            runnerLabel:
                description: 'prod or beta'
                type: string
                default: 'prod'
                
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    pushBuildLatest:
        name: 'Build latest: ${{github.repository}} ${{github.event.head_commit.message}}'
        if: |
          !contains(github.event.head_commit.message, '[skip ci]') &&
          !contains(github.event.head_commit.message, '[skip platform-test]')

        runs-on: ubuntu-latest
            
        steps:
            # We need to fetch at least 2 commits to make a diff for Changelog
            - uses: actions/checkout@v4
              with:
                fetch-depth: 2
            - uses: apify-store/github-actions-source@feat/runner-in-action
              env: 
                # A bit hacky way to pass secrets to the action
                ALL_TOKENS_JSON: ${{ toJSON(secrets) }}
