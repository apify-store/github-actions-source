name: Test
on:
    workflow_call:
        inputs:
            runnerLabel:
                description: 'prod or beta'
                type: string
                default: 'prod'
                
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    platformTest:
        # Sadly, dynamic names mess up matching by status check, stupid github
        # name: 'PR -> Build devel and test: ${{github.repository}} ${{github.event.head_commit.message}}'
        # 
        # TODO: Improve logic when to run stuff
        #if: |
        #  !contains(github.event.pull_request.message, '[skip ci]') &&
        #  !contains(github.event.head_commit.message, '[skip platform-test]')

        runs-on:
            labels: ${{inputs.runnerLabel}}
        steps:
            # We fetch all commits in the PR with the base commit as well
            - name: 'Calculate PR commits + 1'
              run: echo "PR_FETCH_DEPTH=$(( ${{ github.event.pull_request.commits }} + 1 ))" >> "${GITHUB_ENV}"
            - uses: actions/checkout@v4
              with:
                # By default checkout action creates an extra merge commit with the same code that is useless for us
                ref: ${{ github.event.pull_request.head.sha }}
                fetch-depth: ${{ env.PR_FETCH_DEPTH }}
            # A simple node script that converts secrets to env vars
            # Use specific commit SHA to prevent someone stealing that repo
            - uses: oNaiPs/secrets-to-env-action@b64e0192bc4bd2ec0682dee8696470d4866577fa
              with:
                secrets: ${{ toJSON(secrets) }}
            - name: Build and Test actor build
              run: npm run gha:start:build
    unitTest:
        # TODO: only run on changes to code
        runs-on: ubuntu-latest
        defaults:
          run:
            working-directory: ./code

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4

            -   name: Use Node.js 20
                uses: actions/setup-node@v3
                with:
                    node-version: 20
                    cache: 'npm'
                    cache-dependency-path: "code" # https://github.com/actions/setup-node/issues/706

            -   name: Install Dependencies
                run: npm ci

            -   name: Lint
                run: npm run lint

            -   name: Test
                run: npm test
