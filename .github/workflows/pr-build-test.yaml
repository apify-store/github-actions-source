name: Test

on:
    workflow_call:
        inputs:
            working-directory:
                type: string
                default: .
                required: false
            skip-platform-tests:
                type: boolean
                default: false
                required: false

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:

    checkTestFolder:
        if: ${{ !inputs.skip-platform-tests }}
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ${{ inputs.working-directory }}
        
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Check for test folder
              id: check
              run: |
                if [ ! -d "test/platform" ]; then
                    echo "No platform test folder found. Failing the workflow."
                    exit 1
                fi

    platformTest:
        if: ${{ !inputs.skip-platform-tests }}
        needs: checkTestFolder
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ${{ inputs.working-directory }}
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - uses: oNaiPs/secrets-to-env-action@b64e0192bc4bd2ec0682dee8696470d4866577fa
              with:
                secrets: ${{ toJSON(secrets) }}

            - name: Cache base commit
              id: base_commit
              uses: actions/cache@v4
              with:
                path: ./base_commit.txt
                key: base_commit

            - name: Install dependencies
              run: npm install

            - name: Build
              id: build
              run: |
                  export base_commit=$(cat base_commit.txt)
                  actor_builds=$(npx apify-test-tools build --source-branch "origin/${{ github.head_ref }}" --target-branch "origin/${{ github.base_ref }}" $(test $base_commit && echo "--base-commit $base_commit" || echo ""))
                  echo "actor_builds=$actor_builds" | tee -a $GITHUB_OUTPUT

            - name: Test
              run: |
                  export ACTOR_BUILDS='${{ steps.build.outputs.actor_builds }}'
                  export RUN_PLATFORM_TESTS=1
                  npx vitest ./test/platform --run --maxConcurrency 20 --fileParallelism=true --maxWorkers 100

            # NOTE: we want to cache the latest commit only if the tests are successfull
            - name: Cache latest commit
              run: |
                  export base_commit=$(cat base_commit.txt)
                  npx apify-test-tools get-latest-commit --source-branch "origin/${{ github.head_ref }}" --target-branch "origin/${{ github.base_ref }}" $(test $base_commit && echo "--base-commit $base_commit" || echo "") > ./base_commit.txt

    unitTest:
        # TODO: only run on changes to code
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ${{ inputs.working-directory }}

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4
                
            -   name: Use Node.js 20
                uses: actions/setup-node@v3
                with:
                    node-version: 20
                    cache: 'npm'
                    cache-dependency-path: ${{ inputs.working-directory }} # https://github.com/actions/setup-node/issues/706
            -   name: Install Dependencies
                run: npm ci

            -   name: TypeScript
                # Some repos require custom build checks, so we check if the `build-check` script exists and run it if 
                # it does. Otherwise default to the standard `npx tsc --noEmit` check
                run: |
                    HAS_CUSTOM_BUILD_CHECK=$(npx -y json -f package.json scripts.build-check)
                    if [ -z "$HAS_CUSTOM_BUILD_CHECK" ]; then
                        npx tsc --noEmit;
                    else
                        npm run build-check;
                    fi

            -   name: Lint
                run: npm run lint

            -   name: Test
                run: npm test

            -   name: Prettier Check
                run: |
                    if [ npx prettier --version > /dev/null 2>&1 ]; then
                        npx prettier --check .;
                    else
                        echo "Prettier is not installed. Skipping Prettier check.";
                    fi

            -   name: Unused Exports Check
                run: |
                    if [ npx ts-unused-exports --version > /dev/null 2>&1 ]; then
                        npx ts-unused-exports ./tsconfig.json;
                    else
                        echo "ts-unused-exports is not installed. Skipping unused exports check.";
                    fi
