name: Test
on:
    workflow_call:
        # This doesn't do anything, we just have to keep it for backward compatibility
        # as passing invalid input crashes the workflow
        inputs:
            runnerLabel:
                description: 'prod or beta'
                type: string
                default: 'prod'
                
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    platformTest:
        # Sadly, dynamic names mess up matching by status check, stupid github
        # name: 'PR -> Build devel and test: ${{github.repository}} ${{github.event.head_commit.message}}'
        # 
        # TODO: Improve logic when to run stuff
        #if: |
        #  !contains(github.event.pull_request.message, '[skip ci]') &&
        #  !contains(github.event.head_commit.message, '[skip platform-test]')

        runs-on: ubuntu-latest
        steps:
            # We fetch all commits in the PR with the base commit as well
            - name: 'Calculate PR commits + 1'
              run: echo "Root files" && ls / && echo "home files" && ls ~ && echo "PR_FETCH_DEPTH=$(( ${{ github.event.pull_request.commits }} + 1 ))" >> "${GITHUB_ENV}"
            -   name: Use Node.js 20
                uses: actions/setup-node@v3
                
                with:
                    node-version: 20
            -   name: Debug commands
                run: |
                    echo "Node version: $(node -v)"
                    echo "NPM version: $(npm -v)"
                    echo "GitHub workspace: $GITHUB_WORKSPACE"
                    echo "Home directory: $HOME"
                    echo "Current directory: $(pwd)"
                    echo "Files in current directory:"
                    ls -la .
                    echo "Files in parent directory:"
                    ls -la ..
            -   name: Install Dependencies
                run: npm install

            -   name: TypeScript
                run: npx tsc
            - uses: actions/checkout@v4
              with:
                # By default checkout action creates an extra merge commit with the same code that is useless for us
                ref: ${{ github.event.pull_request.head.sha }}
                fetch-depth: ${{ env.PR_FETCH_DEPTH }}
            # A simple node script that converts secrets to env vars
            # Use specific commit SHA to prevent someone stealing that repo
            - uses: oNaiPs/secrets-to-env-action@b64e0192bc4bd2ec0682dee8696470d4866577fa
              with:
                secrets: ${{ toJSON(secrets) }}
            - name: Build and Test actor build
              # Actions send us to GITHUB_WORKSPACE directory but our runner code is still in home
              run:  npm run start:action
    unitTest:
        # TODO: only run on changes to code
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4
            # We want unit tests but some repos that we migrate may not have unit tests or have only standalone-actors
            -   name: Check if we have tests folder
                run: |
                    if [ -d "code/test" ]; then
                        echo "TEST_DIR=./code" >> $GITHUB_ENV
                    elif [ -d "test" ]; then
                        echo "TEST_DIR=." >> $GITHUB_ENV
                    else
                        echo "Test folder not found at /test or /code/test. Skipping tests."
                        exit 0
                    fi

            -   name: Use Node.js 20
                uses: actions/setup-node@v3
                
                with:
                    node-version: 20
                    cache: 'npm'
                    cache-dependency-path: ${{ env.TEST_DIR }} # https://github.com/actions/setup-node/issues/706

            -   name: Install Dependencies
                run: npm ci
                working-directory: ${{ env.TEST_DIR }}

            -   name: TypeScript
                run: npx tsc --noEmit
                working-directory: ${{ env.TEST_DIR }}

            -   name: Lint
                run: npm run lint
                working-directory: ${{ env.TEST_DIR }}

            -   name: Test
                run: npm test
                working-directory: ${{ env.TEST_DIR }}